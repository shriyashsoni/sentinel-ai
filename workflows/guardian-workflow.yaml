name: sentinel-risk-guardian
version: 1

env:
  INPUT_FILE: simulation-data/sample_wallet.json
  DECISION_FILE: simulation-data/risk_decision.json
  RESULT_FILE: simulation-data/onchain_result.json

steps:
  - name: evaluate-risk
    run: python scripts/risk_engine.py --input ${INPUT_FILE} --output ${DECISION_FILE} --threshold 70

  - name: execute-protection
    if: "${{ steps.evaluate-risk.outputs.triggered || true }}"
    run: python scripts/onchain_action.py

outputs:
  decision: simulation-data/risk_decision.json
  onchain: simulation-data/onchain_result.json
